<header class="w-full fixed top-0 z-50 bg-linear-to-r from-primary to-black shadow-lg backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-8 py-3 flex items-center gap-8">

        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-3 pr-6 border-r border-white/30 text-white hover:opacity-90 transition">
            <div class="bg-white/10 p-2 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                    <path d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold uppercase tracking-wide">
                Friends Net
            </h3>
        </a>

        <!-- Navigation -->
        <nav class="flex gap-6 uppercase text-md font-semibold text-white tracking-wide">
            @if(accountService.currentUser()){
            <a routerLink="/members" routerLinkActive="text-accent">Matches</a>
            <a routerLink="/lists" routerLinkActive="text-accent">Lists</a>
            <a routerLink="/messages" routerLinkActive="text-accent">Messages</a>
            }

            <a routerLink="/errors" routerLinkActive="text-accent">Errors</a>
        </nav>

        <!-- Login -->
        <div class="ml-auto flex gap-3">
            @if(accountService.currentUser(); as user){
             <div class="dropdown dropdown-center">
                    <div tabindex="0" role="button" class="flex items-center text-white text-xl gap-3 cursor-pointer">
                        <img src="user.png" alt="user avatar" class="w-10 h-10 rounded-xl">
                        <span>{{user?.displayName}}</span>
                    </div>
                    <ul tabindex="0" class="dropdown-content  menu bg-base-100 rounded-box z-1 w-52 p-2 shadow-sm">
                        <li><a>Edit profile</a></li>
                        <li><a (click)="logout()">Logout</a></li>
                    </ul>
             </div>
            }@else{
             <form #loginForm="ngForm" (ngSubmit)="login()"  class="flex items-center gap-3">
                <input 
                    [(ngModel)]="creds.email"
                    name="email"
                    type="text" 
                    placeholder="Email"
                    class="px-4 py-2 rounded-lg bg-white/10 text-white placeholder-white/60 border border-white/20 focus:outline-none focus:ring-2 focus:ring-primary transition w-44"
                >

                <input 
                    [(ngModel)]="creds.password"
                    name="password"
                    type="password" 
                    placeholder="Password"
                    class="px-4 py-2 rounded-lg bg-white/10 text-white placeholder-white/60 border border-white/20 focus:outline-none focus:ring-2 focus:ring-primary transition w-44"
                >

                <button 
                    type="submit"
                    class="px-5 py-2 rounded-lg bg-primary hover:bg-primary/80 text-white font-semibold shadow-md transition cursor-pointer"
                >
                    Login
                </button>
             </form>
            }    
        </div>

    </div>
</header>
